version: '3.8'

services:
  backend:
    build: ./backend
    container_name: pdf2latex-backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend/uploads:/app/uploads
      - ./backend/outputs:/app/outputs
    environment:
      - FRONTEND_URL=http://localhost:3000
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: pdf2latex-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped
